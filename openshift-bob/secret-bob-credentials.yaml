apiVersion: v1
kind: Secret
metadata:
  name: bob-credentials
  labels:
    app: bob-shell
type: Opaque
stringData:
  # Substitua com suas credenciais reais do Bob Shell
  # Opção 1: Token de API (recomendado)
  BOB_API_TOKEN: "seu-token-api-aqui"
  
  # Opção 2: Credenciais de usuário (se aplicável)
  BOB_USERNAME: "seu-usuario@ibm.com"
  BOB_PASSWORD: "sua-senha-aqui"
  
  # URL do serviço Bob Shell (se necessário)
  BOB_API_URL: "https://bob.ibm.com/api"
---
# Exemplo de como obter o token:
# 1. Acesse https://bob.ibm.com
# 2. Faça login com suas credenciais IBM
# 3. Vá em Settings/Profile > API Tokens
# 4. Gere um novo token
# 5. Copie o token e cole acima em BOB_API_TOKEN
